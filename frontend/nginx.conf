server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — qualquer rota inexistente cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo pros assets com hash do Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache pro index.html (sempre busca a versão nova)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
