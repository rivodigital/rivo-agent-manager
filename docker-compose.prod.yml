# ============================================================================
# Rivo Agent Manager — Production Stack (Hetzner)
# ============================================================================
# Use:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requer .env preenchido a partir do .env.example
# ============================================================================

services:

  caddy:
    image: caddy:2-alpine
    container_name: rivo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rivo-network
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rivo-frontend:latest
    container_name: rivo-frontend
    restart: unless-stopped
    networks:
      - rivo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rivo-backend:latest
    container_name: rivo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/app/prisma/data/dev.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      FALLBACK_MESSAGE: ${FALLBACK_MESSAGE}
      MESSAGE_BUFFER_SECONDS: ${MESSAGE_BUFFER_SECONDS:-3}
      CONVERSATION_HISTORY_LIMIT: ${CONVERSATION_HISTORY_LIMIT:-20}
    volumes:
      - backend_data:/app/prisma/data
    networks:
      - rivo-network
    depends_on:
      evolution-api:
        condition: service_started

  postgres-evolution:
    image: postgres:16-alpine
    container_name: rivo-postgres-evolution
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_EVOLUTION_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_EVOLUTION_PASSWORD}
      POSTGRES_DB: ${POSTGRES_EVOLUTION_DB:-evolution}
    volumes:
      - postgres_evolution_data:/var/lib/postgresql/data
    networks:
      - rivo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_EVOLUTION_USER:-evolution}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rivo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - rivo-network

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: rivo-evolution-api
    restart: unless-stopped
    depends_on:
      postgres-evolution:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_URL: https://${DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_EVOLUTION_USER:-evolution}:${POSTGRES_EVOLUTION_PASSWORD}@postgres-evolution:5432/${POSTGRES_EVOLUTION_DB:-evolution}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange

      CACHE_REDIS_ENABLED: "false"

      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BASE64: "true"

      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_SET: "true"

      LOG_LEVEL: ERROR,WARN,INFO

      CONFIG_SESSION_PHONE_VERSION: 2.3000.1023204200
      CONFIG_SESSION_PHONE_CLIENT: Rivo
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - rivo-network

  deployer:
    build:
      context: ./deployer
      dockerfile: Dockerfile
    image: rivo-deployer:latest
    container_name: rivo-deployer
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./hooks.json:/etc/webhook/hooks.json:ro
      - ./deploy.sh:/scripts/deploy.sh:ro
      - .:/repo
    networks:
      - rivo-network

volumes:
  postgres_evolution_data:
  redis_data:
  evolution_instances:
  backend_data:
  caddy_data:
  caddy_config:

networks:
  rivo-network:
    driver: bridge
